services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lcompendium
      POSTGRES_PASSWORD: lcompendium
      POSTGRES_DB: lcompendium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/lcompendium --ignore-existing;
      mc anonymous set download myminio/lcompendium;
      exit 0;
      "

volumes:
  pgdata:
  minio_data:
